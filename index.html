<!DOCTYPE html>
<html lang="en">
<head>
    <title>Event Registration | KU-UIT</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(160, 32, 240, 0.3); border: 1px solid #333; text-align: center; width: 350px; }
        h2 { color: #a020f0; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #2d2d2d; color: white; }
        button { width: 98%; padding: 12px; background: #a020f0; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #bc4dfd; box-shadow: 0 0 15px #a020f0; }
        .footer { margin-top: 20px; font-size: 0.8rem; color: #888; border-top: 1px solid #333; padding-top: 10px; }
        b { color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Event Register</h2>
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="text" id="event" placeholder="Event Name (e.g. Tech Fest)" required>
        <button onclick="register()">Submit Registration</button>
        <p id="msg"></p>
        
        <div class="footer">
            <p>Created by: <b>Manas Pandya</b></p>
            <p>Roll No: <b>KU2507U0089</b></p>
        </div>
    </div>

    <script>
        async function register() {
            const data = {
                fullName: document.getElementById('name').value,
                eventName: document.getElementById('event').value
            };

            const response = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            document.getElementById('msg').innerText = result.message;
            document.getElementById('msg').style.color = "#4bb543";
        }
    </script>
</body>
</html>
